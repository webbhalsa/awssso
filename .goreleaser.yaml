version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: awssso
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - Merge pull request
      - Merge branch

brews:
  - name: awssso
    repository:
      owner: webbhalsa
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/webbhalsa/awssso"
    description: "AWS SSO helper — setup and login made easy"
    install: |
      bin.install "awssso"
    post_install: |
      system "#{bin}/awssso", "setup-shell"
    caveats: |
      Shell integration has been added to your shell rc file automatically.
      If it wasn't (e.g. you use a non-standard shell or there was an error),
      you can add it by running:
        awssso setup-shell

      Or add it to your shell rc file by hand:
        # zsh / bash:
        eval "$(awssso init)"

        # fish:
        awssso init | source
